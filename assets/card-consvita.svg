<svg width="420" height="130" xmlns="http://www.w3.org/2000/svg">
  <style>
    svg {
      transition: transform 0.25s ease, filter 0.25s ease;
    }

    svg:hover {
      transform: scale(1.05);
      filter: brightness(1.2);
    }
  </style>
  <rect x="5" y="5" width="410" height="120" rx="15"
        fill="#0d1117" stroke="#7c3aed" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </rect>

  <text x="20" y="50" fill="#7c3aed" font-size="20" font-family="monospace">
    ConsVita
  </text>

  <text x="20" y="80" fill="#8b949e" font-size="14" font-family="monospace">
    Custom project  Flutter/Dart
  </text>

  <text x="360" y="55" font-size="28">🧠</text>
</svg>
